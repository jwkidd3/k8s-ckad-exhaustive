apiVersion: batch/v1
kind: CronJob
metadata:
  name: current-date
spec:
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
          - command:
            - /bin/sh
            - -c
            - 'echo "Current date: $(date)"'
            image: nginx:1.23.4
            name: current-date
  schedule: '* * * * *'
